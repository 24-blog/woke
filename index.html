<!DOCTYPE html>
<html lang="ja">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="現代日本における「Woke」関連概念の層別分類図。Social Justice / Woke / 理念・運動理論・制度実践の三層構造を可視化。">
    <title>Woke分類表</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        padding: 16px;
        background: #f5edd6;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        box-sizing: border-box;
      }
      .svg-wrapper {
        width: 100%;
        max-width: 780px;
      }
      .svg-wrapper svg {
        width: 100%;
        height: auto;
        display: block;
      }
    </style>
  </head>
    
  <body>
    <div class="svg-wrapper">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 548" font-family="'Noto Serif JP', 'Georgia', serif">
        <defs>
          <!-- Paper texture background -->
          <filter id="paper">
            <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
            <feColorMatrix type="saturate" values="0" in="noise" result="grayNoise"/>
            <feBlend in="SourceGraphic" in2="grayNoise" mode="multiply" result="blend"/>
            <feComposite in="blend" in2="SourceGraphic" operator="in"/>
          </filter>
          <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
            <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#8B7355" flood-opacity="0.25"/>
          </filter>
          <filter id="softshadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#8B7355" flood-opacity="0.15"/>
          </filter>

          <!-- Layer fills -->
          <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#fdf6e3"/>
            <stop offset="100%" stop-color="#f5edd6"/>
          </linearGradient>
          <linearGradient id="eGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e8dcc8"/>
            <stop offset="100%" stop-color="#d9ccb0"/>
          </linearGradient>
          <linearGradient id="wokeGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f0e6cc"/>
            <stop offset="100%" stop-color="#e6d8b8"/>
          </linearGradient>
          <linearGradient id="aGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f5efe0"/>
            <stop offset="100%" stop-color="#ede3cc"/>
          </linearGradient>
          <linearGradient id="bGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f8f2e4"/>
            <stop offset="100%" stop-color="#f0e8d4"/>
          </linearGradient>
          <linearGradient id="cGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#faf6ec"/>
            <stop offset="100%" stop-color="#f2eada"/>
          </linearGradient>
        </defs>

        <!-- Background -->
        <rect width="780" height="548" fill="url(#bg)" rx="4"/>
        <rect width="780" height="548" fill="url(#bg)" rx="4" filter="url(#paper)" opacity="0.4"/>

        <!-- Outer border -->
        <rect x="16" y="16" width="748" height="488" fill="none" stroke="#9c8660" stroke-width="1" rx="3" opacity="0.5"/>

        <!-- Title -->
        <text x="390" y="48" text-anchor="middle" font-size="13" fill="#5a4a2a" letter-spacing="3" font-style="italic" opacity="0.8">現代日本の悪正義概念</text>
        <line x1="120" y1="54" x2="310" y2="54" stroke="#9c8660" stroke-width="0.7" opacity="0.5"/>
        <line x1="470" y1="54" x2="660" y2="54" stroke="#9c8660" stroke-width="0.7" opacity="0.5"/>

        <!-- ===== (e') Social Justice — outermost layer ===== -->
        <rect x="36" y="68" width="708" height="420" rx="8" fill="url(#eGrad)" stroke="#8B7040" stroke-width="1.2" filter="url(#softshadow)"/>
        <!-- label -->
        <text x="58" y="91" font-size="10" fill="#5a4020" letter-spacing="1.5" opacity="0.7">e′</text>
        <text x="72" y="91" font-size="13" fill="#3d2a0a" font-weight="bold" letter-spacing="0.5">Social Justice</text>
        <text x="175" y="91" font-size="10" fill="#7a6040" font-style="italic">— 理念的包括概念</text>

        <!-- ===== (e) Woke — second layer ===== -->
        <rect x="56" y="104" width="668" height="370" rx="6" fill="url(#wokeGrad)" stroke="#9c7830" stroke-width="1" filter="url(#softshadow)"/>
        <text x="78" y="126" font-size="10" fill="#5a4020" letter-spacing="1.5" opacity="0.7">e</text>
        <text x="92" y="126" font-size="13" fill="#4a3010" font-weight="bold" letter-spacing="0.5">Woke</text>
        <text x="146" y="126" font-size="10" fill="#8a6840" font-style="italic">— 政治的束ねラベル</text>

        <!-- Divider line between layers -->
        <line x1="76" y1="138" x2="704" y2="138" stroke="#b09050" stroke-width="0.6" stroke-dasharray="4,3" opacity="0.6"/>

        <!-- ===== Row labels (left axis) ===== -->
        <!-- a -->
        <text x="75" y="202" font-size="10" fill="#6a5030" letter-spacing="1" transform="rotate(-90,75,202)" text-anchor="middle" opacity="0.7">a</text>
        <!-- b -->
        <text x="75" y="320" font-size="10" fill="#6a5030" letter-spacing="1" transform="rotate(-90,75,320)" text-anchor="middle" opacity="0.7">b</text>
        <!-- c -->
        <text x="75" y="428" font-size="10" fill="#6a5030" letter-spacing="1" transform="rotate(-90,75,428)" text-anchor="middle" opacity="0.7">c</text>

        <!-- ===== (a) 理念層 ===== -->
        <rect x="86" y="148" width="598" height="100" rx="5" fill="url(#aGrad)" stroke="#a08840" stroke-width="0.8"/>
        <!-- layer badge -->
        <rect x="96" y="157" width="60" height="18" rx="3" fill="#c8a850" opacity="0.3"/>
        <text x="126" y="170" text-anchor="middle" font-size="9.5" fill="#5a3a10" letter-spacing="1.5" font-weight="bold">理念</text>

        <!-- concept chips: a layer -->
        <!-- インクルーシブ -->
        <rect x="168" y="154" width="120" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="228" y="173" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">インクルーシブ</text>
        <text x="228" y="189" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Inclusive</text>
        <text x="228" y="200" text-anchor="middle" font-size="8.5" fill="#9a7850">関係の規範</text>

        <!-- ダイバーシティ -->
        <rect x="300" y="154" width="120" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="360" y="173" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">ダイバーシティ</text>
        <text x="360" y="189" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Diversity</text>
        <text x="360" y="200" text-anchor="middle" font-size="8.5" fill="#9a7850">差異の記述</text>

        <!-- ジェンダー -->
        <rect x="432" y="154" width="110" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="487" y="173" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">ジェンダー</text>
        <text x="487" y="189" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Gender</text>
        <text x="487" y="200" text-anchor="middle" font-size="8.5" fill="#9a7850">b層と重複</text>

        <!-- note bracket for ジェンダー -->
        <line x1="548" y1="178" x2="560" y2="178" stroke="#c09860" stroke-width="0.8"/>
        <text x="564" y="176" font-size="8" fill="#a07840" font-style="italic">b寄り</text>

        <!-- layer description -->
        <text x="96" y="236" font-size="9" fill="#7a5a30" font-style="italic">理念・分析概念層 ── 可視化・計量可能な対象を扱う</text>

        <!-- ===== (b) 運動理論層 ===== -->
        <rect x="86" y="260" width="598" height="96" rx="5" fill="url(#bGrad)" stroke="#a08840" stroke-width="0.8"/>
        <rect x="96" y="269" width="60" height="18" rx="3" fill="#c8a850" opacity="0.3"/>
        <text x="126" y="282" text-anchor="middle" font-size="9.5" fill="#5a3a10" letter-spacing="1.5" font-weight="bold">運動理論</text>

        <!-- フェミニズム -->
        <rect x="168" y="266" width="130" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="233" y="285" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">フェミニズム</text>
        <text x="233" y="301" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Feminism</text>
        <text x="233" y="312" text-anchor="middle" font-size="8.5" fill="#9a7850">理論的体系あり</text>

        <!-- ポリコレ -->
        <rect x="312" y="266" width="160" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="392" y="285" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">ポリコレ</text>
        <text x="392" y="301" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Political Correctness</text>
        <text x="392" y="312" text-anchor="middle" font-size="8.5" fill="#c07030">→ メタ規範（言語・行動規範）</text>

        <text x="96" y="342" font-size="9" fill="#7a5a30" font-style="italic">運動理論層 ── 組織的実践・規範形成を駆動する理論</text>

        <!-- ===== (c) 制度実践層 ===== -->
        <rect x="86" y="368" width="598" height="92" rx="5" fill="url(#cGrad)" stroke="#a08840" stroke-width="0.8"/>
        <rect x="96" y="377" width="60" height="18" rx="3" fill="#c8a850" opacity="0.3"/>
        <text x="126" y="390" text-anchor="middle" font-size="9.5" fill="#5a3a10" letter-spacing="1.5" font-weight="bold">制度実践</text>

        <!-- AA -->
        <rect x="168" y="374" width="120" height="48" rx="4" fill="#fdf8ee" stroke="#b09050" stroke-width="0.8" filter="url(#softshadow)"/>
        <text x="228" y="393" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">AA</text>
        <text x="228" y="409" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Affirmative Action</text>
        <text x="228" y="420" text-anchor="middle" font-size="8.5" fill="#9a7850">法的・政策的措置</text>

        <!-- DEI -->
        <rect x="302" y="374" width="190" height="48" rx="4" fill="#fdf8ee" stroke="#c09030" stroke-width="1.2" filter="url(#softshadow)"/>
        <text x="397" y="393" text-anchor="middle" font-size="11.5" fill="#3a2a08" font-weight="bold">DEI</text>
        <text x="397" y="409" text-anchor="middle" font-size="9" fill="#7a6040" font-style="italic">Diversity · Equity · Inclusion</text>
        <text x="397" y="420" text-anchor="middle" font-size="8.5" fill="#c07030">※ a-c 合成語：概念的に不安定</text>

        <!-- DEI annotation arrows up -->
        <line x1="370" y1="374" x2="350" y2="210" stroke="#b08840" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.5"/>
        <line x1="397" y1="374" x2="440" y2="210" stroke="#b08840" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.5"/>
        <line x1="420" y1="374" x2="225" y2="210" stroke="#b08840" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.5"/>

        <text x="96" y="448" font-size="9" fill="#7a5a30" font-style="italic">制度実践層 ── 法・組織・政策として具体化された介入</text>

        <!-- ===== Legend / footer ===== -->
        <line x1="36" y1="516" x2="744" y2="516" stroke="#9c8660" stroke-width="0.6" opacity="0.4"/>
        <text x="46" y="534" font-size="8.5" fill="#9a7850" font-style="italic">── DEI破線：a/b/c三層にまたがる合成概念であることを示す</text>
        <text x="500" y="534" font-size="8.5" fill="#9a7850" font-style="italic">ポリコレ：理論というよりメタ規範</text>
      </svg>
    </div>
  </body>
  
</html>
